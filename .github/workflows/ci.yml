name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # CI only typechecks and builds; no browser is ever launched.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      NEXT_TELEMETRY_DISABLED: 1
      # Never connected to — Prisma only needs the var to exist to generate the client.
      DATABASE_URL: file:./ci.db
      AUTH_SECRET: ci-placeholder-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run build
